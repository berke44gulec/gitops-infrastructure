apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: http-error-rate-check
  namespace: dev
spec:
  metrics:
  - name: success-rate
    count: 1 
    successCondition: result[0] < 0.05
    consecutiveErrorLimit: 0 
    provider:
      prometheus:
        address: http://prometheus-k8s.monitoring.svc.cluster.local:9090
        query: vector(0.08)
