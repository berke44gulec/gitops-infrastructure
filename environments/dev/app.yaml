apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-config
  namespace: dev
data:
  app.mode: "development"
  welcome.message: "GitOps Lab Ortamina Hos Geldiniz!"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: web
        image: nginxinc/nginx-unprivileged:alpine
        ports:
        - containerPort: 8080 
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/nginx/html/config
      volumes:
      - name: config-volume
        configMap:
          name: sample-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app-service
  namespace: dev
spec:
  selector:
    app: sample-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
