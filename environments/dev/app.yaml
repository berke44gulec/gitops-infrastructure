apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-config
  namespace: dev
data:
  app.mode: "development"
  welcome.message: "GitOps Lab Ortamina Hos Geldiniz!"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/nginx/html/config
      volumes:
      - name: config-volume
        configMap:
          name: sample-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app-service
  namespace: dev
spec:
  selector:
    app: sample-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
