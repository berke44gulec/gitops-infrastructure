apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-sample-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/berke44gulec/gitops-infrastructure.git'
    targetRevision: HEAD
    path: environments/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
