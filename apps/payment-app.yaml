apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-payment-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/berke44gulec/gitops-infrastructure.git'
    targetRevision: HEAD
    path: environments/dev/services/payment
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
