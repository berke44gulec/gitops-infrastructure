apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # SMTP Sunucu Ayarları (Gmail)
  service.email.smtp: |
    host: smtp.gmail.com
    port: 587
    from: argocd-alerts@srv-01.local
    username: berkegulec93@gmail.com
    password: $smtp-password

  # Temiz E-posta Şablonu
  template.app-sync-failed-email: |
    email:
      subject: "🚨 [ArgoCD Alert] {{.app.metadata.name}} Sync Failed!"
      body: |
        <h3>ArgoCD Uygulama Senkronizasyon Hatasi</h3>
        <p><strong>Uygulama Adi:</strong> {{.app.metadata.name}}</p>
        <p><strong>Git Deposu:</strong> {{.app.spec.source.repoURL}}</p>
        <p><strong>Durum:</strong> {{.app.status.sync.status}}</p>
        <hr>
        <p>Kubernetes API sunucusu manifestoyu reddetti veya uygulama Degraded durumunda.</p>

  # DOĞRU TETİKLEYİCİ: Sadece Sync başarısızsa veya tamamen bozulduysa tetikle
  trigger.on-sync-failed: |
    - description: Gerçek hata durumlarında tetikle
      when: app.status.sync.status == 'Failed' or app.status.health.status == 'Degraded'
      send: [app-sync-failed-email]
